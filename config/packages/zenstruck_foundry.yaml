when@dev: &dev
    # See full configuration: https://symfony.com/bundles/ZenstruckFoundryBundle/current/index.html#full-default-bundle-configuration
    zenstruck_foundry:
        persistence:
            # Flush only once per call of `PersistentObjectFactory::create()`
            flush_once: true
        faker:
            locale: de_DE
#            seed: null
        make_factory:
            # Namespace to use for make:factory. Is overridden by --namespace option
            default_namespace: 'DataGenerator\Factory'
when@test: *dev

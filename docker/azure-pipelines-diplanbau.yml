trigger: none

resources:
  repositories:
    - repository: diplanbau
      type: git
      name: diplanbeteiligung-diplanbau
    - repository: k8s
      type: git
      name: diplanbeteiligung-diplanbau-k8s
      ref: refs/heads/develop

pool:
  name: DiPlan Docker Agent Pool

parameters:
  - name: push
    displayName: Push images to registry
    type: boolean
    default: false

variables:
  imageBase: harbor.develop.diplanung.de/diplan-develop/diplan-beteiligung/bau
  projectName: diplanbau

steps:
  - checkout: self
    path: core

  - checkout: diplanbau
    path: core/projects/diplanbau

  - checkout: k8s
    path: k8s

  - script: |
      TAG=$(grep -A 10 '^image:' "$(Pipeline.Workspace)/k8s/diplan-beteiligung/values/develop/bau/develop.yaml" \
        | grep -m 1 '^\s*tag:' \
        | sed 's/[[:space:]]*tag:[[:space:]]*//')
      if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
        echo "##vso[task.logissue type=error]Could not read image tag from k8s values file"
        exit 1
      fi
      echo "Image tag resolved to: $TAG"
      echo "##vso[task.setvariable variable=VERSION]$TAG"
    displayName: Read image tag from k8s values

  # GITHUB_TOKEN is required for addon installation during the Docker build.
  # Add it as a secret pipeline variable named GITHUB_TOKEN.
  - script: echo "GITHUB_TOKEN=$(GITHUB_TOKEN)" > $(Pipeline.Workspace)/core/.env.local
    displayName: Create .env.local
    env:
      GITHUB_TOKEN: $(GITHUB_TOKEN)

  - script: |
      echo "$(Build.BuildId)" > $(Pipeline.Workspace)/core/build-id.txt
      echo "build-id.txt" >> $(Pipeline.Workspace)/core/docker/rsyncInclude.txt
    displayName: Create build-id.txt

  - script: docker login harbor.develop.diplanung.de -u $(HARBOR_USER) -p $(HARBOR_PASSWORD)
    displayName: Login to Harbor
    condition: eq('${{ parameters.push }}', true)
    env:
      HARBOR_USER: $(HARBOR_USER)
      HARBOR_PASSWORD: $(HARBOR_PASSWORD)

  - script: |
      PUSH_FLAG=""
      if [ "${{ parameters.push }}" = "True" ]; then
        PUSH_FLAG="-p"
      fi
      ./build.sh $PUSH_FLAG $(imageBase) $(VERSION) $(projectName)
    displayName: Build Docker images
    workingDirectory: $(Pipeline.Workspace)/core/docker

  - script: |
      rm -f $(Pipeline.Workspace)/core/.env.local
      docker logout harbor.develop.diplanung.de
    displayName: Cleanup
    condition: always()

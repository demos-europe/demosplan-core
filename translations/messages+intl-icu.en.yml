about.introduction: >-
    <p>When spatial developments are planned or prepared, this affects many interest groups. Various
    planning documents are drafted at all levels of administration - from the federal government to the municipalities - and differ
    in their content focus depending on the planning authority. One task of governmental planning is to
    weigh essential interests, minimize conflicts between different areas, and make optimal use of
    land.</p>

    <p>Therefore, the public and TöB (Träger öffentlicher Belange) are allowed to have their say in planning processes. In
    statewide planning, additional institutions, such as environmental and nature conservation associations, are also
    invited to submit statements depending on the planning occasion.</p>

    <p>Participation in urban land-use planning is regulated in the BauGB. During a defined period, statements
    from the public and TöB are collected and evaluated by the responsible case workers. The contents of the statements
    must be included and addressed in the assessment of all interests before the development plans and
    land-use plans are adopted.</p>

    <p>The ROG, supplemented by the corresponding state planning laws, provides for participation of
    the public as well as public bodies affected in their interests in spatial planning procedures. This
    includes, for example, spatial planning plans of the state or federal government, regional plans, and spatial planning procedures.</p>

    <p>A plan approval procedure under the Administrative Procedure Act is an approval procedure
    for major infrastructure projects. These can include, for example, roads, railways, light rail systems, airports,
    high/extra-high voltage power lines, landfills, or water body developments. When constructed, these affect
    a large number of public interests as well as typically a multitude of private interests. All
    affected authorities whose areas of responsibility are touched are invited to submit statements.</p>

    <p><strong>DiPlanBeteiligung is a platform where you can exercise your right to participate online.</strong></p>

    <p>The planning authorities upload public announcements, documents, and plans via DiPlanBeteiligung. The
    public and TöB can, for example, learn about planned urban development measures and other projects in the authorities
    and submit statements.</p>

    <p>DiPlanBeteiligung is a joint project of the Free and Hanseatic City of Hamburg and the federal government in cooperation
    with the federal states of Berlin and Bremen. It was funded and further developed within the framework of the Online Access Act.
    The scope of functions will be gradually expanded in the coming months to include participation in spatial planning and hearings
    in the course of plan approval procedures. Participation in the context of landscape planning and in
    procedures under the BImSchG is also planned.</p>

    <p>A nationwide overview of all spatial planning documents and formal participation procedures under the BauGB
    as well as prospectively spatial planning and plan approval can be found in our
    <a class="o-link--external" href="{diplanportalurl}" target="_blank" rel="noopener">DiPlanPortal</a>.
    </p>

    <p>DiPlanBeteiligung is provided as free software under the open-source license for the European Union
    "European Union Public License" (EUPL) on the Open CoDE platform for public administration
    <a class="o-link--external" href="https://gitlab.opencode.de/diplanung/" target="_blank" rel="noopener">
    DiPlanung · GitLab (opencode.de)</a>.
    </p>

    <p>DiPlanBeteiligung is a software component of the DiPlanung product family. More information about DiPlanung can be found
    <a class="o-link--external" href="https://diplanung.de/" target="_blank" rel="noopener">here</a>.
    </p>

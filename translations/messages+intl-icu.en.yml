text.customer.settings: |
    All settings made here are effective within the domain <strong>{domain}</strong> and its subpages.
    If organisations have their own appearance customisations, these will be displayed on the organisation's procedure pages.
    For changes to the colour scheme, please contact <a href="mailto:support@bauleitplanung-online.de">support@bauleitplanung-online.de</a>.
text.department.edit: "Here you can manage your departments. Clicking on a department opens the detail view where the data can be edited."
text.elementimport.fileupload: "You can pack your planning documents into a zip file and import them. All subfolders with all files will be imported. In a next step, you can check whether the import meets your expectations and adjust the titles of files and folders if necessary."
text.elementimport: "This is the preview of how your files would be imported. By default, the file name is used as the document title. You can also give individual files or folders an alternative title or cancel the import."
text.email.change: "Below you can change your email address."
text.email.export.confirm: "Thank you, you have requested the export.<br />Once you confirm this prompt with \"OK\", you will receive a link to download the archive by email to {email}.<br />If you would like it sent to a different address, please enter it in the following field and then confirm with \"OK\"."
text.invitable_institution.add: "Here you can assign authorities and institutions to the procedure and invite them to participate."
text.invitable_institution.administer: "Here you assign authorities and institutions from the state list to the procedure or blueprint. Enter an invitation text as an email below and save. Once you have added all participants, mark them in the list and send the invitation using the button of the same name."
text.invite.unregistered.recipient: ""
text.mapsection: "You can adopt the map boundaries from the map. Navigate to the section you want to select and click \"Adopt map boundaries\" to adopt the general map boundaries, and \"Adopt initial map view\" to adopt the initial map view. Save the form after selection."
text.mapsection.hint: "Please note that the procedure location (basic settings) must be within the selected initial map view and the initial map view must be within the map boundaries."
text.mapsection.updated: "The map data has been successfully updated."
text.master.new: "In the following form you can create a new blueprint. From your blueprints you can then derive procedures. If you want to copy a new blueprint from an existing blueprint, select the corresponding blueprint. If the new blueprint should be created without settings, select \"empty blueprint\"."
text.masters.list: "The list view shows all blueprints of your organisation."
text.mydata.citizen: "Here you can view your personal data with which you are registered. If you would like to change your data, please do so under \"My data\"."
text.mydata: "Here you can view the data with which you are registered for Bauleitplanung. If you would like to edit your data, please do so under \"My data\". Here you can subscribe to or unsubscribe from the newsletter."
text.notifications.new.procedures: "Would you like to be informed about new procedures (early participations and public displays)? Create your notifications here. As soon as procedures with one of your postal codes (+radius) enter the participation phase, you will be informed by email. You can find your email address under <a class=\"underline color-alt-contrast\" href=\"{link}\">My data</a>."
text.organisation.edit.self.portal: "Here you can view and edit the data with which your organisation is registered on <strong>{projectName}</strong>."
text.organisation.edit.self.gateway: "Here you can view the data with which your organisation is registered on <strong>{projectName}</strong>. If you would like to edit this data, please do so in the Gateway. Here you can only edit a few additional details."
text.organisation.edit: "Here you can edit the data of an organisation. Via \"Manage departments\" you can create one or more departments or organisational units. The assignment of individual users to a department can be done on the \"User management\" page."
text.organisation.branding.edit: "Here you can define the appearance of your organisation's procedures in the public area."
text.password.change: "Below you can change your password. A secure password is either a short (at least 8 characters) but complex character string, or a combination of partially intentionally misspelled words separated by spaces. The password must be at least 8 characters long, use upper and lower case letters and contain at least one digit. Additionally, the new password must not match any of the last five passwords used. Please keep your password secret."
text.plandocuments.administer: "This is where the management of planning documents and the upload of associated planning documents takes place. Within the category, planning document files can be uploaded."
text.procedure.adjustments.master: "Here you can change the blueprint details. In the respective procedures, you can make more detailed changes at this point."
text.procedure.adjustments: "Here you can change the procedure details. For example, you can configure the procedure phases for institutions and the public."
text.procedure.edit.authorized.users: "Please select the users of your organisation who should have access to this procedure. Since you cannot change your own access rights, you will not appear in the list."
text.procedure.edit.additional.notifyCounty: "Notify counties about submitted statements via email in this procedure"
text.procedure.edit.additional.notifyCounty.hint: "This setting controls whether a county must be specified when submitting a statement. When submitting the statement, a brief notification is sent to the county's email address stored in the system."
text.procedure.edit.additional.notifyCounty.setEmails.hint: "Please ensure that you have verified the correctness of the email addresses and the authorisation to send in terms of procedural compliance and data protection."
text.procedure.edit.data_input_orgas: "You can commission organisations to collect statements for this procedure."
text.procedure.edit.link_box: "In this field, links to other procedures can be entered. These will then be displayed on the procedure page in a link box."
text.procedure.edit.note: "In this field, internal notes for colleagues can be entered."
text.procedure.edit.planning_agency: "One or more planning agencies can be involved in a procedure by the procedure-leading organisation. Involved planning agencies can configure all settings of a procedure and perform the evaluation. Select your commissioned planning agency from the list. Planning agencies must register beforehand."
text.procedure.edit.external.change_phase: "The procedure phase (public) controls the visibility of all documents and information in the procedure and the statement functions for citizens. Once the \"Early public participation\" or \"Public display\" is enabled, the procedure is publicly accessible on the internet and statements can be submitted."
text.procedure.edit.external.contact_person: "Please name one or more contact persons in the procedure for citizens. Ideally, also provide contact options via phone, email and/or office hours."
text.procedure.edit.external.coordinates: "Place the point here on the map to display the procedure as a marker on the map in the participation layer. This allows citizens to conveniently find it via the map."
text.procedure.edit.external.location_name: "Enter the postal code of the procedure location to make it easier to find via the list and search in the participation layer."
text.procedure.edit.external.location_name.autocomplete: " After selecting the postal code, the city should fill in automatically."
text.procedure.edit.external.pictogram: "Upload an image of the development plan section on a map. Image size: min. 500x300 px, formats: png, jpeg, gif; file size: max. 5 MB."
text.procedure.edit.external.public_participations_start_date: "The period should correspond to the display period of the procedure and serves only to inform the participants. You still need to manually make the procedure public via the procedure phase."
text.procedure.edit.external.public_participations_start_date.autoswitch_phase: "The period should correspond to the display period of the procedure. If it is a procedure phase with participation, the procedure will be automatically set to \"Evaluation\" at the end of the period. For other procedure phases, the period serves only as information. You still need to manually switch the procedure phase or enable automatic switching."
text.procedure.edit.external.short_url: "Give the procedure a readable public web address (e.g. \"Bebauungsplan11-Jugendzentrum-Schlossallee\"). This can be printed in official gazettes or other print media. Ideally, do not use special characters such as umlauts or punctuation and no spaces."
text.procedure.edit.internal.change_phase: "The procedure phase (institutions) controls the visibility of all documents and information in the procedure and the statement functions for authorities and other institutions. Once the \"Early TöB participation\" or \"TöB participation\" is enabled, the procedure is visible to all institutions listed under the menu item \"Manage institutions\" and statements can be submitted. Citizens are involved independently of this step (see below)."
text.procedure.edit.internal.legalNotice: "The legal notice is displayed for institutions behind the procedure phase. When changing the procedure phase, the notice is automatically deleted; you will need to re-enter and save it if necessary. "
text.procedure.edit.internal.pictogram: "You can upload an image file as a coat of arms here; it will then be displayed in the institution procedure on the \"News\" page. A coat of arms may already be stored from the blueprint."
text.procedure.edit.internal.start_date: "The period should correspond to the display period of the procedure and serves to inform the participants - no automation is associated with it. You still need to manually make the procedure public via the procedure phase. One week before the period expires, an automatic email will be sent to the assigned institutions, unless they have disabled emails."
text.procedure.edit.internal.start_date.autoswitch_phase: "The period should correspond to the display period of the procedure. If it is a procedure phase with participation, the procedure will be automatically set to \"Evaluation\" at the end of the period. For other procedure phases, the period serves only as information. You still need to manually switch the procedure phase or enable automatic switching. One week before the period expires, an automatic email will be sent to the assigned institutions, unless they have disabled emails."
text.procedure.description.wizard: "Describe your procedure as clearly and not too long (600 characters) as possible to give a brief overview. The procedure description is displayed in the participation layer."
text.procedure.name: "The procedure name was already defined when the procedure was created. You can change it here. Please note that the name will also change for all participants."
text.procedure.name.public: "You can assign a different procedure name for citizens. If you leave the field empty, the name already entered from the institution participation will be automatically used."

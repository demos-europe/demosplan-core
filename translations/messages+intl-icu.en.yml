wizard.done.content: |
    <p class="weight--bold">
        You have now completed the general settings of the procedure.
    </p>
    <p>
        The complete preparation of the procedure for institution and public participation additionally includes the following steps:
    </p>
    <ul>
        <li>
            provide the site plan as a WMS
        </li>
        <li>
            import textual provisions as Word docx and upload as PDF
        </li>
        <li>
            import justification as Word docx and upload as PDF
        </li>
        <li>
            possibly provide additional planning documents, such as environmental report
        </li>
        <li>
            possibly create current announcements addressing the institutions/public
        </li>
        <li>
            add institutions to the procedure (possibly already done via the blueprint)
        </li>
        <li>
            inform institutions by email
        </li>
    </ul>

text.procedure.edit.external.public_participations_start_date: "Der Zeitraum sollte dem Auslegungszeitraum des Verfahrens entsprechen und dient nur der Information der Beteiligten. Sie mΟΦssen das Verfahren immer noch manuell ΟΦber den Verfahrensschritt ΟΕffentlich machen."
text.procedure.edit.external.public_participations_start_date.autoswitch_phase: "Der Zeitraum sollte dem Auslegungszeitraum des Verfahrens entsprechen. Handelt es sich um einen Verfahrensschritt mit Beteiligung, wird das Verfahren am Ende des Zeitraums automatisch auf \"Auswertung\" gestellt. Bei anderen Verfahrensschritten dient der Zeitraum nur der Information. Sie mΟΦssen den Verfahrensschritt immer noch manuell umstellen oder die automatische Umstellung aktivieren."
text.procedure.edit.external.short_url: "Geben Sie dem Verfahren eine verstΟΛndliche ΟΕffentliche Webadresse (z.B. βÄûBebauungsplan11-Jugendzentrum-SchlossalleeβÄ€). Diese kann z.B. im Amtsblatt oder in anderen Printmedien abgedruckt werden. Verwenden Sie idealerweise keine Sonderzeichen wie Umlaute oder Satzzeichen und keine Leerzeichen."
text.procedure.edit.internal.change_phase: "Der Verfahrensschritt (Institutionen) steuert die Sichtbarkeit aller Dokumente und Informationen im Verfahren und die Stellungnahmefunktionen fΟΦr die BehΟΕrden und sonstigen Institutionen. Sobald die βÄûFrΟΦhzeitige Beteiligung TΟΕBβÄ€ oder die βÄûBeteiligung TΟΕBβÄ€ eingeschaltet ist, ist das Verfahren fΟΦr alle unter dem MenΟΦpunkt βÄûInstitutionen verwaltenβÄ€ eingetragenen Institutionen sichtbar und es kΟΕnnen Stellungnahmen abgegeben werden. Die BΟΦrger*innen werden unabhΟΛngig von diesem Schritt beteiligt (siehe unten)."

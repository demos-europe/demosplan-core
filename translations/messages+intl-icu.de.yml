text.procedure.edit.internal.start_date: "Der Zeitraum sollte dem Auslegungszeitraum des Verfahrens entsprechen und dient der Information der Beteiligten - eine Automatik ist damit nicht verbunden. Sie mΟΦssen das Verfahren immer noch manuell ΟΦber den Verfahrensschritt ΟΕffentlich machen. Eine Woche vor Ablauf des Zeitraumes wird eine automatische E-Mail an die zugewiesenen Institutionen verschickt, sofern diese die E-Mails nicht ausgeschaltet haben."
text.procedure.edit.internal.start_date.autoswitch_phase: "Der Zeitraum sollte dem Auslegungszeitraum des Verfahrens entsprechen. Handelt es sich um einen Verfahrensschritt mit Beteiligung, wird das Verfahren am Ende des Zeitraums automatisch auf \"Auswertung\" gestellt. Bei anderen Verfahrensschritten dient der Zeitraum nur der Information. Sie mΟΦssen den Verfahrensschritt immer noch manuell umstellen oder die automatische Umstellung aktivieren. Eine Woche vor Ablauf des Zeitraumes wird eine automatische E-Mail an die zugewiesenen Institutionen verschickt, sofern diese die E-Mails nicht ausgeschaltet haben."

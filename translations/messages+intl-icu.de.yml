abort.and.back: "Abbrechen und zurΟΦck"
about.introduction: >-
    <p>Wenn rΟΛumliche Entwicklungen geplant oder vorbereitet werden, berΟΦhrt das viele Interessengruppen.  Verschiedene
    Planwerke werden auf allen Ebenen der Verwaltung - vom Bund bis zu den Kommunen - ausgearbeitet und sind, abhΟΛngig
    vom Plangeber, unterschiedlich in ihren inhaltlichen Schwerpunkten. Eine Aufgabe der behΟΕrdlichen Planung ist,
    wesentliche Interessen abzuwΟΛgen, Konflikte zwischen verschiedenen Bereichen zu minimieren und FlΟΛchen bestmΟΕglich
    zu nutzen.</p>

    <p>Darum darf die Ο•ffentlichkeit sowie TrΟΛger ΟΕffentlicher Belange (TΟΕB) bei den Planungen mitreden. Bei
    landesweiten Planungen sind weitere Institutionen, wie zum Beispiel Umwelt- und Naturschutzvereinigungen, je nach
    Planungsanlass ebenfalls aufgefordert Stellung zu nehmen.</p>

    <p>Die Beteiligung in der Bauleitplanung steht im Baugesetzbuch. In einem festgelegten Zeitraum werden Stellungnahmen
    der Ο•ffentlichkeit und TΟΕB gesammelt und von der zustΟΛndigen Sachbearbeitung ausgewertet. Die Inhalte der Stellungnahmen
    mΟΦssen bei der AbwΟΛgung aller Belange aufgenommen und adressiert werden, bevor die Bebauungs- und FlΟΛchennutzungsplΟΛne
    verabschiedet werden.</p>

    <p>Das Raumordnungsgesetz, ergΟΛnzt um die entsprechenden Landesplanungsgesetze, sieht eine Beteiligung der
    Ο•ffentlichkeit sowie die in ihren Belangen berΟΦhrten ΟΕffentlichen Stellen an raumordnerischen Verfahren vor. Hierzu
    zΟΛhlen z.B. RaumordnungsplΟΛne des Landes oder des Bundes, RegionalplΟΛne, sowie Raumordnungsverfahren.</p>

    <p>Bei einem Planfeststellungsverfahren nach dem Verwaltungsverfahrensgesetz handelt es sich um ein Genehmigungsverfahren
    fΟΦr grΟΕΟüere Vorhaben in der Infrastruktur. Das kΟΕnnen z.B. StraΟüen, Eisenbahnen, Stadtbahnen, FlugplΟΛtze,
    Hoch-/HΟΕchstspannungsleitungen des Stromnetzes, Deponien oder auch GewΟΛsserausbauten sein. Diese berΟΦhren bei ihrer
    Erstellung eine groΟüe Menge an ΟΕffentlichen wie auch zumeist eine Vielzahl an Interessen des privaten Lebens. Alle
    betroffenen BehΟΕrden, deren Aufgabenbereiche hier berΟΦhrt werden, sind zur Stellungnahme aufgefordert.</p>

    <p><strong>DiPlanBeteiligung ist eine Plattform, auf der Sie Ihr Recht zur Mitsprache online wahrnehmen kΟΕnnen.</strong></p>

    <p>Die planenden BehΟΕrden laden ΟΕffentliche Bekanntmachungen, Unterlagen und PlΟΛne ΟΦber DiPlanBeteiligung hoch. Die
    Ο•ffentlichkeit und TΟΕB kΟΕnnen sich z.B. ΟΦber geplante stΟΛdtebauliche Entwicklungen und andere Vorhaben in den BehΟΕrden
    informieren und Stellungnahmen einreichen.</p>

    <p>DiPlanBeteiligung ist ein gemeinsames Projekt der Freien und Hansestadt Hamburg und dem Bund in Zusammenarbeit
    mit den BundeslΟΛndern Berlin und Bremen. Es wurde im Rahmen des Onlinezugangsgesetz gefΟΕrdert und weiterentwickelt.
    Der Funktionsumfang wird in den folgenden Monaten um Beteiligungen an der Raumordnung und AnhΟΕrungen im Zuge von
    Planfeststellungsverfahren schrittweise erweitert. Auch sind Beteiligungen im Rahmen der Landschaftsplanung und bei
    Verfahren nach dem  Bundes-Immissionsschutzgesetz vorgesehen.</p>

    <p>Eine bundesweite Ο€bersicht ΟΦber alle raumbezogenen Planwerke und formalen Beteiligungsverfahren des Baugesetzbuches
    sowie perspektivisch der Raumordnung und Planfeststellung finden Sie in unserem
    <a class="o-link--external" href="{diplanportalurl}" target="_blank" rel="noopener">DiPlanPortal</a>.
    </p>

    <p>DiPlanBeteiligung ist als freie Software unter der Open-Source-Lizenz fΟΦr die EuropΟΛische Union
    βÄûEuropean Union Public LicenseβÄ€ (EUPL) auf der Open CoDE Plattform der ΟΕffentlichen Verwaltung bereitgestellt
    <a class="o-link--external" href="https://gitlab.opencode.de/diplanung/" target="_blank" rel="noopener">
    DiPlanung ¬Ζ GitLab (opencode.de)</a>.
    </p>

    <p>DiPlanBeteiligung ist eine Software-Komponente der DiPlanung-Produktfamilie. Mehr Informationen zur DiPlanung finden Sie
    <a class="o-link--external" href="https://diplanung.de/" target="_blank" rel="noopener">hier</a>.
    </p>

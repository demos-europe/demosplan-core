text.procedure.edit.planning_agency: "Ein oder mehrere PlanungsbΟΦros kΟΕnnen durch die verfahrensfΟΦhrende Organisation an einem Verfahren beteiligt werden. Beteiligte PlanungsbΟΦros kΟΕnnen alle Einstellungen eines Verfahrens und die Auswertung vornehmen. WΟΛhlen Sie aus der Liste Ihr beauftragtes PlanungsbΟΦro aus. PlanungsbΟΦros mΟΦssen sich vorher auch registrieren."
text.procedure.edit.external.change_phase: "Der Verfahrensschritt (Ο•ffentlichkeit) steuert die Sichtbarkeit aller Dokumente und Informationen im Verfahren und die Stellungnahmefunktionen fΟΦr die BΟΦrger*innen. Sobald die βÄûFrΟΦhzeitige Beteiligung Ο•ffentlichkeitβÄ€ oder die βÄûΟ•ffentliche AuslegungβÄ€ eingeschaltet sind, ist das Verfahren ΟΕffentlich im Internet aufrufbar und es kΟΕnnen Stellungnahmen abgegeben werden."
